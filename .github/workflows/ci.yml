name: ShopFlow CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: shopflow_test
          POSTGRES_USER: shopflow
          POSTGRES_PASSWORD: shopflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout sorgenti
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build e test unitari
        run: mvn clean verify -Dspring.profiles.active=test

      # TODO (Esercizio CI/CD — da configurare con il supporto dell'AI):
      # - aggiungere analisi SonarQube
      # - aggiungere quality gate check
      # - configurare notifica Slack in caso di build failure

      - name: Pubblica report test
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/

